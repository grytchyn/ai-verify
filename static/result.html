<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title">Your AI Compliance Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08090a;
            --surface: #0f1011;
            --surface2: #191a1b;
            --surface3: #23252a;
            --brand: #5e6ad2;
            --brand-hover: #828fff;
            --accent: #7170ff;
            --text-primary: #f7f8f8;
            --text-secondary: #d0d6e0;
            --text-tertiary: #8a8f98;
            --text-muted: #62666d;
            --border: rgba(255,255,255,0.08);
            --border-subtle: rgba(255,255,255,0.05);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #f44336;
            --radius: 8px;
            --radius-sm: 6px;
            --radius-lg: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: rgba(8,9,10,0.85); backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-subtle);
        }
        .nav-inner {
            max-width: 900px; margin: 0 auto; padding: 14px 24px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .logo {
            display: flex; align-items: center; gap: 10px;
            font-weight: 600; font-size: 18px; color: var(--text-primary); text-decoration: none;
        }
        .logo-icon {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, var(--brand), var(--accent));
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: 700;
        }
        .nav-back { color: var(--text-secondary); text-decoration: none; font-size: 14px; font-weight: 500; }
        .nav-back:hover { color: var(--text-primary); }
        .lang-toggle {
            display: flex; align-items: center; gap: 4px;
            margin-left: auto; margin-right: 16px;
        }
        .lang-btn {
            background: none; border: 1px solid var(--border);
            color: var(--text-muted); padding: 4px 10px;
            border-radius: 4px; font-size: 12px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; text-transform: uppercase;
        }
        .lang-btn.active { background: var(--brand); color: white; border-color: var(--brand); }
        .lang-btn:hover:not(.active) { color: var(--text-secondary); }

        .status-bar {
            margin-top: 72px;
            padding: 40px 24px;
            text-align: center;
        }
        .status-bar .spinner {
            display: inline-block; width: 24px; height: 24px;
            border: 3px solid var(--border); border-top-color: var(--brand);
            border-radius: 50%; animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status-bar h2 { font-size: 24px; margin-bottom: 8px; }
        .status-bar p { color: var(--text-tertiary); }

        .report-container {
            max-width: 900px; margin: 0 auto 80px; padding: 0 24px;
        }

        .report-header {
            margin-top: 100px;
            background: linear-gradient(135deg, var(--surface), var(--surface2));
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 40px;
            display: flex; justify-content: space-between; align-items: flex-start;
            gap: 24px; flex-wrap: wrap;
        }
        .report-header-info h1 {
            font-size: 28px; font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }
        .report-header-info .company {
            font-size: 16px; color: var(--text-secondary);
        }
        .report-header-info .time {
            font-size: 13px; color: var(--text-muted); margin-top: 8px;
        }
        .report-header-actions {
            display: flex; gap: 12px; flex-wrap: wrap;
        }
        .btn-download {
            background: var(--brand); color: white; border: none;
            padding: 10px 24px; border-radius: var(--radius-sm);
            font-size: 14px; font-weight: 500; cursor: pointer;
            text-decoration: none; display: inline-flex; align-items: center; gap: 8px;
            transition: background 0.2s;
        }
        .btn-download:hover { background: var(--brand-hover); }
        .btn-new {
            background: rgba(255,255,255,0.04); color: var(--text-secondary);
            border: 1px solid var(--border); padding: 10px 24px;
            border-radius: var(--radius-sm); font-size: 14px; font-weight: 500;
            cursor: pointer; text-decoration: none; display: inline-flex;
            align-items: center; gap: 8px; transition: all 0.2s;
        }
        .btn-new:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }

        .report-body {
            margin-top: 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 40px;
            line-height: 1.8;
        }
        .report-body h1 { font-size: 24px; font-weight: 600; margin: 24px 0 12px; color: var(--text-primary); }
        .report-body h2 { font-size: 20px; font-weight: 600; margin: 20px 0 10px; color: var(--text-primary); }
        .report-body h3 { font-size: 17px; font-weight: 600; margin: 16px 0 8px; color: var(--accent); }
        .report-body p { margin: 8px 0; color: var(--text-secondary); }
        .report-body strong { color: var(--text-primary); }
        .report-body ul, .report-body ol { margin: 8px 0; padding-left: 24px; }
        .report-body li { margin: 4px 0; color: var(--text-secondary); }
        .report-body hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
        .report-body table { width: 100%; border-collapse: collapse; margin: 16px 0; }
        .report-body th {
            background: var(--surface2); color: var(--text-primary);
            padding: 10px 14px; text-align: left; font-weight: 600;
            border: 1px solid var(--border); font-size: 14px;
        }
        .report-body td {
            padding: 10px 14px; border: 1px solid var(--border);
            color: var(--text-secondary); font-size: 14px;
        }
        .report-body code {
            background: var(--surface2); padding: 2px 6px;
            border-radius: 4px; font-size: 13px; font-family: 'JetBrains Mono', monospace;
        }
        .report-body blockquote {
            border-left: 3px solid var(--brand);
            padding: 12px 16px; margin: 16px 0;
            background: rgba(94,106,210,0.06);
            color: var(--text-secondary);
            border-radius: 0 4px 4px 0;
        }
        .report-body a { color: var(--accent); }

        .error-section {
            text-align: center; padding: 60px 24px;
        }
        .error-section h2 { font-size: 24px; color: var(--danger); margin-bottom: 12px; }
        .error-section p { color: var(--text-tertiary); margin-bottom: 24px; }
        .error-section .btn-new { display: inline-flex; }

        .report-summary {
            margin-top: 24px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }
        .summary-card {
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 20px;
            text-align: center;
        }
        .summary-card .value {
            font-size: 28px; font-weight: 700; margin-bottom: 4px;
        }
        .summary-card .label {
            font-size: 13px; color: var(--text-tertiary);
        }

        @media (max-width: 768px) {
            .report-header { flex-direction: column; }
            .report-body { padding: 24px; }
        }

        /* Email section after report */
        .email-section {
            margin-top: 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
            text-align: center;
        }
        .email-section h3 { font-size: 18px; margin-bottom: 8px; }
        .email-section p { font-size: 14px; color: var(--text-tertiary); margin-bottom: 16px; }
        .email-input-group {
            display: flex; gap: 12px; max-width: 480px; margin: 0 auto; justify-content: center;
        }
        .email-input-group input {
            flex: 1; background: var(--bg); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 12px 14px;
            color: var(--text-primary); font-size: 15px;
            font-family: 'Inter', system-ui, sans-serif;
        }
        .email-input-group input:focus { outline: none; border-color: var(--brand); }
        .email-input-group button {
            background: var(--brand); color: white; border: none;
            padding: 12px 24px; border-radius: var(--radius-sm);
            font-size: 14px; font-weight: 500; cursor: pointer;
            white-space: nowrap;
        }
        .email-input-group button:hover { background: var(--brand-hover); }
        .email-sent { color: var(--success); font-size: 14px; margin-top: 8px; }

        /* Fix overflow on report body */
        .report-body { overflow-x: auto; word-wrap: break-word; }
        .report-body img { max-width: 100%; height: auto; }
        .report-body table { word-break: break-word; }
    </style>
</head>
<body>
    <nav>
        <div class="nav-inner">
            <a href="/" class="logo">
                <div class="logo-icon">AC</div>
                AI Compliance
            </a>
            <div class="lang-toggle">
                <button class="lang-btn active" onclick="setLang('en')" id="langEn">EN</button>
                <button class="lang-btn" onclick="setLang('de')" id="langDe">DE</button>
            </div>
            <a href="/submit-page" class="nav-back" data-i18n="newReport">→ New Report</a>
        </div>
    </nav>

    <div id="app">
        <div class="status-bar" id="loading">
            <div class="spinner"></div>
            <h2>Generating your compliance report...</h2>
            <p>AI is analyzing your company data against EU AI Act requirements</p>
        </div>

        <div class="report-container" id="reportContent" style="display:none;">
            <div class="report-header">
                <div class="report-header-info">
                    <h1 id="reportTitle">AI Compliance Report</h1>
                    <p class="company" id="companyName"></p>
                    <p class="time" id="reportTime"></p>
                </div>
                <div class="report-header-actions">
                    <a href="/submit-page" class="btn-new">← New Report</a>
                    <button class="btn-download" onclick="downloadReport()">⬇ Download Report</button>
                </div>
            </div>

            <div class="report-summary" id="reportSummary"></div>

            <div class="report-body" id="reportBody">
                <!-- Report content rendered here -->
            </div>
        </div>

        <div class="error-section" id="errorContent" style="display:none;">
            <h2>⚠️ Report Generation Failed</h2>
            <p>An error occurred while generating the report. Please try again.</p>
            <a href="/submit-page" class="btn-new">← Try Again</a>
        </div>
    </div>

    <script>
        const i18n = {
            en: {
                title: 'Your AI Compliance Report',
                newReport: '→ New Report',
                loading: 'Generating your compliance report...',
                loadingDesc: 'AI is analyzing your company data against EU AI Act requirements',
                loadingAttempt: 'Generating report... (attempt ',
                reportTitle: 'AI Compliance Report',
                generated: 'Generated: ',
                company: 'Company',
                regulation: 'EU AI Act',
                analysisDepth: 'Analysis Depth',
                sections: ' sections',
                comprehensive: 'Comprehensive',
                failed: '⚠️ Report Generation Failed',
                failedDesc: 'An error occurred while generating the report. Please try again.',
                tryAgain: '← Try Again',
                noId: 'No report ID provided',
                noIdDesc: 'Please submit the form first.',
                startHere: '← Start Here',
                download: '⬇ Download Report',
                newReportBtn: '← New Report',
                emailTitle: '📧 Send Report via Email',
                emailDesc: 'Enter your email to receive a copy of this compliance report.',
                emailPlaceholder: 'you@company.com',
                emailBtn: 'Send Report',
                emailSent: '✓ Report sent! Check your inbox.',
                sending: 'Sending...',
            },
            de: {
                title: 'Ihr KI-Compliance-Bericht',
                newReport: '→ Neuer Bericht',
                loading: 'Generiere Ihren Compliance-Bericht...',
                loadingDesc: 'KI analysiert Ihre Unternehmensdaten auf EU AI Act-Anforderungen',
                loadingAttempt: 'Generiere Bericht... (Versuch ',
                reportTitle: 'KI-Compliance-Bericht',
                generated: 'Generiert: ',
                company: 'Unternehmen',
                regulation: 'EU AI Act',
                analysisDepth: 'Analysetiefe',
                sections: ' Abschnitte',
                comprehensive: 'Umfassend',
                failed: '⚠️ Berichtserstellung fehlgeschlagen',
                failedDesc: 'Bei der Erstellung des Berichts ist ein Fehler aufgetreten.',
                tryAgain: '← Erneut versuchen',
                noId: 'Keine Berichts-ID angegeben',
                noIdDesc: 'Bitte senden Sie zuerst das Formular ab.',
                startHere: '← Hier starten',
                download: '⬇ Bericht herunterladen',
                newReportBtn: '← Neuer Bericht',
                emailTitle: '📧 Bericht per E-Mail senden',
                emailDesc: 'Geben Sie Ihre E-Mail-Adresse ein, um eine Kopie dieses Berichts zu erhalten.',
                emailPlaceholder: 'ihre@firma.de',
                emailBtn: 'Bericht senden',
                emailSent: '✓ Bericht gesendet! Prüfen Sie Ihr Postfach.',
                sending: 'Wird gesendet...',
            }
        };

        let currentLang = localStorage.getItem('ai-compliance-lang') || 'en';

        function setLang(lang) {
            currentLang = lang;
            const t = i18n[lang] || i18n.en;
            document.getElementById('htmlRoot').lang = lang;
            document.title = t.title;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('lang' + lang.charAt(0).toUpperCase() + lang.slice(1)).classList.add('active');
            document.querySelector('[data-i18n="newReport"]').textContent = t.newReport;
            localStorage.setItem('ai-compliance-lang', lang);
        }

        const subId = new URLSearchParams(window.location.search).get('id');
        if (!subId) {
            const t = i18n[currentLang];
            document.getElementById('loading').innerHTML = `<h2>${t.noId}</h2><p>${t.noIdDesc}</p><a href="/submit-page" class="btn-new">${t.startHere}</a>`;
        } else {
            pollReport(subId);
        }

        let reportMarkdown = '';
        let reportHtml = '';
        let companyName = '';
        let submissionId = subId;

        async function pollReport(id) {
            const maxAttempts = 60;
            let attempt = 0;
            const t = () => i18n[currentLang] || i18n.en;
            
            while (attempt < maxAttempts) {
                try {
                    const resp = await fetch('/report-html/' + id);
                    if (!resp.ok) throw new Error('HTTP ' + resp.status);
                    const data = await resp.json();
                    
                    if (data.status === 'completed') {
                        showReport(data);
                        return;
                    } else if (data.status === 'failed') {
                        showError();
                        return;
                    } else {
                        attempt++;
                        document.querySelector('#loading p').textContent = 
                            t().loadingAttempt + attempt + '/' + maxAttempts + ')';
                    }
                } catch (err) {
                    console.error('Poll error:', err);
                }
                await new Promise(r => setTimeout(r, 3000));
            }
            showError();
        }

        function showReport(data) {
            const t = i18n[currentLang] || i18n.en;
            document.getElementById('loading').style.display = 'none';
            document.getElementById('reportContent').style.display = 'block';
            
            companyName = data.company || 'Your Company';
            reportHtml = data.html || '<p>No content</p>';
            reportMarkdown = data.markdown || '';
            submissionId = subId;
            
            document.getElementById('reportTitle').textContent = data.title || t.reportTitle;
            document.getElementById('companyName').textContent = data.company || '';
            document.getElementById('reportTime').textContent = t.generated + new Date().toLocaleString(currentLang === 'de' ? 'de-DE' : 'en-US');
            
            document.getElementById('reportBody').innerHTML = reportHtml;
            
            const summary = document.getElementById('reportSummary');
            const sectionCount = data.markdown ? (data.markdown.match(/##/g) || []).length + t.sections : t.comprehensive;
            summary.innerHTML = `
                <div class="summary-card">
                    <div class="value" style="color: var(--accent);">${companyName}</div>
                    <div class="label">${t.company}</div>
                </div>
                <div class="summary-card">
                    <div class="value" style="color: var(--success);">EU AI Act</div>
                    <div class="label">${t.regulation}</div>
                </div>
                <div class="summary-card">
                    <div class="value" style="color: var(--warning);">${sectionCount}</div>
                    <div class="label">${t.analysisDepth}</div>
                </div>
            `;

            // Add email section after report body
            const emailSection = document.createElement('div');
            emailSection.className = 'email-section';
            emailSection.id = 'emailSection';
            emailSection.innerHTML = `
                <h3>${t.emailTitle}</h3>
                <p>${t.emailDesc}</p>
                <div class="email-input-group">
                    <input type="email" id="reportEmailInput" placeholder="${t.emailPlaceholder}">
                    <button onclick="sendReportEmail()" id="emailBtn">${t.emailBtn}</button>
                </div>
                <div class="email-sent" id="emailSent" style="display:none;">${t.emailSent}</div>
            `;
            document.getElementById('reportContent').appendChild(emailSection);
        }

        function showError() {
            const t = i18n[currentLang] || i18n.en;
            document.getElementById('loading').style.display = 'none';
            document.getElementById('errorContent').style.display = 'block';
            document.querySelector('#errorContent h2').textContent = t.failed;
            document.querySelector('#errorContent p').textContent = t.failedDesc;
            document.querySelector('#errorContent a').textContent = t.tryAgain;
        }

        function downloadReport() {
            const t = i18n[currentLang] || i18n.en;
            if (!reportMarkdown) {
                alert(t.noId);
                return;
            }
            const blob = new Blob([reportMarkdown], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'ai-compliance-report-' + companyName.replace(/[^a-zA-Z0-9]/g, '-') + '.md';
            a.click();
            URL.revokeObjectURL(url);
        }

        async function sendReportEmail() {
            const t = i18n[currentLang] || i18n.en;
            const input = document.getElementById('reportEmailInput');
            const btn = document.getElementById('emailBtn');
            const sent = document.getElementById('emailSent');
            
            if (!input.value || !input.value.includes('@')) {
                input.style.borderColor = 'var(--danger)';
                return;
            }
            input.style.borderColor = '';
            
            btn.disabled = true;
            btn.textContent = t.sending;
            
            try {
                const resp = await fetch('/send-report-email', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        id: submissionId,
                        email: input.value,
                        lang: currentLang
                    })
                });
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                sent.style.display = 'block';
                btn.textContent = '✓';
            } catch (err) {
                alert(t.errorTxt + err.message);
                btn.disabled = false;
                btn.textContent = t.emailBtn;
            }
        }

        // Init language
        const savedLang = localStorage.getItem('ai-compliance-lang') || 'en';
        setLang(savedLang);
    </script>
</body>
</html>
